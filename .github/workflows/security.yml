name: Security Checks

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  node-dependencies:
    name: Node dependency audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - front-streambuted
          - services/catalog-service
          - services/live-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci --ignore-scripts
      - name: Audit production dependencies
        working-directory: ${{ matrix.project }}
        run: npm audit --omit=dev --audit-level=high

  python-dependencies:
    name: Python dependency audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - services/media-service
          - services/streaming-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit Python dependencies
        working-directory: ${{ matrix.project }}
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt --strict

  java-dependencies:
    name: Java dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw
      - name: Test Identity Service
        run: ./mvnw -B test
      - name: Audit Maven dependencies
        run: ./mvnw -B -DskipTests org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -DskipTestScope=true

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
          - java-kotlin
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
