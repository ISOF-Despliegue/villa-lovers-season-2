name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-streambuted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-streambuted/package-lock.json
      - run: npm ci
      - run: npm test -- --runInBand
      - env:
          VITE_API_BASE_URL: https://api.migueleelg0106.me/api
          VITE_GATEWAY_URL: https://api.migueleelg0106.me
        run: npm run build:pages

  catalog:
    name: Catalog
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/catalog-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/catalog-service/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  live:
    name: Live
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/live-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/live-service/package-lock.json
      - run: npm ci
      - run: npm run lint

  python-services:
    name: Python Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - services/media-service
          - services/streaming-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: python -m pip install -r requirements.txt
      - name: Run tests
        working-directory: ${{ matrix.project }}
        run: python -m pytest

  identity:
    name: Identity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -B test
      - run: ./mvnw -B -DskipTests clean package
