name: Deploy Frontend To GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "front-streambuted/**"
      - ".github/workflows/deploy-frontend-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-streambuted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-streambuted/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build GitHub Pages artifact
        env:
          VITE_API_BASE_URL: https://api.migueleelg0106.me/api
          VITE_GATEWAY_URL: https://api.migueleelg0106.me
        run: npm run build:pages
      - name: Verify SPA fallback
        run: test -f dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: front-streambuted/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
