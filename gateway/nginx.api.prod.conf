# Host-level Nginx config for api.migueleelg0106.me on the DigitalOcean Droplet.
# Decision: TLS terminates on host Nginx. Docker Compose exposes its gateway only
# on 127.0.0.1:${GATEWAY_INTERNAL_PORT:-8080}; internal services stay private.
# Install this for the API subdomain only. Do not use it for migueleelg0106.me.

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

upstream streambuted_docker_gateway {
  server 127.0.0.1:8080;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name api.migueleelg0106.me;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.migueleelg0106.me;

  ssl_certificate /etc/letsencrypt/live/api.migueleelg0106.me/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.migueleelg0106.me/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  server_tokens off;
  client_max_body_size 256m;

  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Request-Id $http_x_request_id;

  location = / {
    return 404;
  }

  location /api/ {
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_request_buffering off;
    proxy_pass http://streambuted_docker_gateway;
  }

  location /live/ws/socket.io/ {
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_pass http://streambuted_docker_gateway;
  }

  location /socket.io/ {
    return 404;
  }

  location ~ ^/(actuator|metrics|minio|rabbitmq|admin|grpc)(/|$) {
    return 404;
  }
}
