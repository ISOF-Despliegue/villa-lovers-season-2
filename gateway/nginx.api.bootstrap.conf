# Bootstrap-only host Nginx config for api.migueleelg0106.me.
# Use this before Certbot creates /etc/letsencrypt/live/api.migueleelg0106.me.
# It intentionally has no ssl_certificate directives, so `nginx -t` works
# before certificates exist. Replace it with nginx.api.prod.conf after certonly.

server {
  listen 80;
  listen [::]:80;
  server_name api.migueleelg0106.me;

  server_tokens off;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 404;
  }
}
