events {}

http {
  server_tokens off;

  upstream identity_service { server identity-service:8081; }
  upstream catalog_service { server catalog-service:8082; }
  upstream media_service { server media-service:8083; }
  upstream streaming_service { server streaming-service:8084; }
  upstream live_service { server live-service:3003; }

  server {
    listen 80;
    server_name _;
    client_max_body_size 256m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Request-Id $http_x_request_id;
    proxy_pass_request_headers on;

    location = /api/v1/auth { return 308 /api/v1/auth/; }
    location = /api/v1/catalog { return 308 /api/v1/catalog/; }
    location = /api/v1/media { return 308 /api/v1/media/; }
    location = /api/v1/playback { return 308 /api/v1/playback/; }
    location = /api/v1/live { return 308 /api/v1/live/; }

    location = /api/v1/auth/actuator/health { proxy_pass http://identity_service/actuator/health; }
    location = /api/v1/catalog/health { proxy_pass http://catalog_service/health; }
    location = /api/v1/media/health { proxy_pass http://media_service/health; }
    location = /api/v1/playback/health { proxy_pass http://streaming_service/health; }
    location = /api/v1/live/health { proxy_pass http://live_service/health; }

    location ~ ^/api/v1/media/assets/[^/]+/metadata$ { return 404; }

    location /api/v1/auth/users/ { proxy_pass http://identity_service/api/v1/users/; }
    location /api/v1/auth/ { proxy_pass http://identity_service/api/v1/auth/; }
    location /api/v1/users/ { proxy_pass http://identity_service/api/v1/users/; }
    location /api/v1/catalog/ { proxy_pass http://catalog_service/api/v1/catalog/; }
    location /api/v1/media/ {
      proxy_request_buffering off;
      proxy_pass http://media_service/api/v1/media/;
    }
    location /api/v1/playback/ {
      proxy_set_header Range $http_range;
      proxy_set_header If-Range $http_if_range;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://streaming_service/api/v1/playback/;
    }

    # REST del live-service.
    location /api/v1/live/ {
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://live_service/api/v1/live/;
    }

    # Socket.io del live-service. Reescribe /live/ws/socket.io hacia /socket.io.
    location /live/ws/socket.io/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
      proxy_pass http://live_service/socket.io/;
    }
  }
}
