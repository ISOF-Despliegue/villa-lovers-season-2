events {}

http {
  upstream identity_service {
    server identity-service:8081;
  }

  upstream catalog_service {
    server catalog-service:8082;
  }

  upstream media_service {
    server media-service:8083;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 64m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Request-Id $http_x_request_id;
    proxy_pass_request_headers on;

    location = /api/v1/auth {
      return 308 /api/v1/auth/;
    }

    location = /api/v1/catalog {
      return 308 /api/v1/catalog/;
    }

    location = /api/v1/media {
      return 308 /api/v1/media/;
    }

    location = /api/v1/auth/actuator/health {
      proxy_pass http://identity_service/actuator/health;
    }

    location = /api/v1/catalog/health {
      proxy_pass http://catalog_service/health;
    }

    location = /api/v1/media/health {
      proxy_pass http://media_service/health;
    }

    location ~ ^/api/v1/media/assets/[^/]+/metadata$ {
      return 404;
    }

    location /api/v1/auth/users/ {
      proxy_pass http://identity_service/api/v1/users/;
    }

    location /api/v1/auth/ {
      proxy_pass http://identity_service/api/v1/auth/;
    }

    location /api/v1/users/ {
      proxy_pass http://identity_service/api/v1/users/;
    }

    location /api/v1/catalog/ {
      proxy_pass http://catalog_service/api/v1/catalog/;
    }

    location /api/v1/media/ {
      proxy_request_buffering off;
      proxy_pass http://media_service/api/v1/media/;
    }
  }
}
