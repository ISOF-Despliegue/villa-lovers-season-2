services:
  identity-postgres:
    image: postgres:16.2-alpine
    container_name: streambuted-identity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?missing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: ${POSTGRES_IDENTITY_DB:?missing}
      POSTGRES_APP_USER: ${POSTGRES_IDENTITY_APP_USER:?missing}
      POSTGRES_APP_PASSWORD: ${POSTGRES_IDENTITY_APP_PASSWORD:?missing}
      POSTGRES_INITDB_ARGS: "-c client_encoding=UTF8"
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data
      - ./db/init/identity:/docker-entrypoint-initdb.d:ro
    networks:
      - backend

  catalog-postgres:
    image: postgres:16.2-alpine
    container_name: streambuted-catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?missing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: ${POSTGRES_CATALOG_DB:?missing}
      POSTGRES_APP_USER: ${POSTGRES_CATALOG_APP_USER:?missing}
      POSTGRES_APP_PASSWORD: ${POSTGRES_CATALOG_APP_PASSWORD:?missing}
      POSTGRES_INITDB_ARGS: "-c client_encoding=UTF8"
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
      - ./db/init/catalog:/docker-entrypoint-initdb.d:ro
    networks:
      - backend

  streaming-mongo:
    image: mongo:7.0
    container_name: streambuted-streaming-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${STREAMING_MONGO_ROOT_USER:?missing}
      MONGO_INITDB_ROOT_PASSWORD: ${STREAMING_MONGO_ROOT_PASSWORD:?missing}
      MONGO_INITDB_DATABASE: ${STREAMING_MONGO_DB:?missing}
      STREAMING_MONGO_DB: ${STREAMING_MONGO_DB:?missing}
      STREAMING_MONGO_APP_USER: ${STREAMING_MONGO_APP_USER:?missing}
      STREAMING_MONGO_APP_PASSWORD: ${STREAMING_MONGO_APP_PASSWORD:?missing}
    expose:
      - "27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - streaming_mongo_data:/data/db
      - ./db/init/streaming-mongo:/docker-entrypoint-initdb.d:ro
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: streambuted-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?missing}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?missing}
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: streambuted-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?missing}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?missing}
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - minio_data:/data
    networks:
      - backend

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    container_name: streambuted-identity-service
    restart: unless-stopped
    depends_on:
      identity-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://identity-postgres:5432/${POSTGRES_IDENTITY_DB:?missing}
      DB_USERNAME: ${POSTGRES_IDENTITY_APP_USER:?missing}
      DB_PASSWORD: ${POSTGRES_IDENTITY_APP_PASSWORD:?missing}
      SPRING_PROFILES_ACTIVE: prod
      DB_DDL_AUTO: ${DB_DDL_AUTO:-validate}
      REFRESH_COOKIE_SECURE: "true"
      JWT_ISSUER: ${JWT_ISSUER:?missing}
      JWT_AUDIENCE: ${JWT_AUDIENCE:?missing}
      JWT_KEY_ID: ${JWT_KEY_ID:?missing}
      JWT_RSA_PRIVATE_KEY_PEM: ${JWT_RSA_PRIVATE_KEY_PEM:-}
      JWT_RSA_PUBLIC_KEY_PEM: ${JWT_RSA_PUBLIC_KEY_PEM:-}
      JWT_RSA_PRIVATE_KEY_BASE64: ${JWT_RSA_PRIVATE_KEY_BASE64:-}
      JWT_RSA_PUBLIC_KEY_BASE64: ${JWT_RSA_PUBLIC_KEY_BASE64:-}
      EVENT_SIGNING_SECRET: ${EVENT_SIGNING_SECRET:?missing}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?missing}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?missing}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?missing}
      RABBITMQ_VHOST: /
      SERVER_PORT: 8081
      GRPC_PORT: 9091
      MEDIA_GRPC_TARGET: media-service:9093
      MEDIA_GRPC_TIMEOUT_MS: ${MEDIA_GRPC_TIMEOUT_MS:-2000}
      EMAIL_HOST: ${EMAIL_HOST:?missing}
      EMAIL_PORT: ${EMAIL_PORT:?missing}
      EMAIL_USER: ${EMAIL_USER:?missing}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:?missing}
      EMAIL_FROM: ${EMAIL_FROM:?missing}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_SMTP_AUTH: ${EMAIL_SMTP_AUTH:-true}
      EMAIL_STARTTLS_ENABLE: ${EMAIL_STARTTLS_ENABLE:-true}
      EMAIL_VERIFICATION_SUBJECT: ${EMAIL_VERIFICATION_SUBJECT:-StreamButed verification code}
      MAIL_HEALTH_ENABLED: ${MAIL_HEALTH_ENABLED:-false}
      REGISTRATION_VERIFICATION_CODE_TTL: ${REGISTRATION_VERIFICATION_CODE_TTL:-15m}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?missing}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?missing}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:?missing}
      FRONTEND_URL: ${FRONTEND_URL:?missing}
    expose:
      - "8081"
      - "9091"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - backend

  catalog-service:
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
    container_name: streambuted-catalog-service
    restart: unless-stopped
    command: ["node", "dist/main.js"]
    depends_on:
      catalog-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 8082
      CATALOG_GRPC_PORT: 9092
      DATABASE_URL: postgresql://${POSTGRES_CATALOG_APP_USER:?missing}:${POSTGRES_CATALOG_APP_PASSWORD:?missing}@catalog-postgres:5432/${POSTGRES_CATALOG_DB:?missing}?schema=public
      JWT_JWKS_URL: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      JWT_ISSUER: ${JWT_ISSUER:?missing}
      JWT_AUDIENCE: ${JWT_AUDIENCE:?missing}
      MEDIA_GRPC_TARGET: media-service:9093
      MEDIA_GRPC_TIMEOUT_MS: ${MEDIA_GRPC_TIMEOUT_MS:-2000}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?missing}:${RABBITMQ_DEFAULT_PASS:?missing}@rabbitmq:5672
      EVENT_SIGNING_SECRET: ${EVENT_SIGNING_SECRET:?missing}
      RABBITMQ_USER_PROMOTED_QUEUE: catalog.user.promoted
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?missing}
    expose:
      - "8082"
      - "9092"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); const req=http.get({host:'127.0.0.1',port:8082,path:'/health',timeout:2000}, (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.on('timeout', () => { req.destroy(); process.exit(1); });"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  media-service:
    build:
      context: .
      dockerfile: services/media-service/Dockerfile
    container_name: streambuted-media-service
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      MEDIA_PORT: 8083
      MEDIA_GRPC_PORT: 9093
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:?missing}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?missing}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?missing}
      MINIO_BUCKET: ${MINIO_BUCKET:?missing}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MEDIA_MAX_AUDIO_SIZE_MB: ${MEDIA_MAX_AUDIO_SIZE_MB:-200}
      MEDIA_MAX_IMAGE_SIZE_MB: ${MEDIA_MAX_IMAGE_SIZE_MB:-5}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?missing}
      JWT_ISSUER: ${JWT_ISSUER:?missing}
      JWT_JWKS_URL: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      JWT_AUDIENCE: ${JWT_AUDIENCE:?missing}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?missing}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?missing}
      EVENT_SIGNING_SECRET: ${EVENT_SIGNING_SECRET:?missing}
    expose:
      - "8083"
      - "9093"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  streaming-service:
    build:
      context: .
      dockerfile: services/streaming-service/Dockerfile
    container_name: streambuted-streaming-service
    restart: unless-stopped
    depends_on:
      streaming-mongo:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      STREAMING_PORT: 8084
      STREAMING_MONGO_URI: ${STREAMING_MONGO_URI:?missing}
      STREAMING_MONGO_DB: ${STREAMING_MONGO_DB:?missing}
      STREAMING_PLAYBACK_TOKEN_SECRET: ${STREAMING_PLAYBACK_TOKEN_SECRET:?missing}
      STREAMING_PLAYBACK_TOKEN_TTL_SECONDS: ${STREAMING_PLAYBACK_TOKEN_TTL_SECONDS:-300}
      STREAMING_VALID_PLAYBACK_SECONDS: ${STREAMING_VALID_PLAYBACK_SECONDS:-30}
      CATALOG_GRPC_TARGET: catalog-service:9092
      CATALOG_GRPC_TIMEOUT_SECONDS: ${CATALOG_GRPC_TIMEOUT_SECONDS:-5}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?missing}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?missing}
      MINIO_BUCKET: ${MINIO_BUCKET:?missing}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      JWT_ISSUER: ${JWT_ISSUER:?missing}
      JWT_JWKS_URL: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      JWT_AUDIENCE: ${JWT_AUDIENCE:?missing}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?missing}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?missing}
      EVENT_SIGNING_SECRET: ${EVENT_SIGNING_SECRET:?missing}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?missing}
    expose:
      - "8084"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8084/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  live-service:
    build:
      context: .
      dockerfile: services/live-service/Dockerfile
    container_name: streambuted-live-service
    restart: unless-stopped
    depends_on:
      identity-service:
        condition: service_healthy
    environment:
      PORT: 3003
      NODE_ENV: production
      JWT_ISSUER: ${JWT_ISSUER:?missing}
      JWT_JWKS_URL: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      JWT_AUDIENCE: ${JWT_AUDIENCE:?missing}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?missing}
      SOCKET_IO_PATH: /socket.io
      MEDIASOUP_LISTEN_IP: ${MEDIASOUP_LISTEN_IP:-0.0.0.0}
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:?missing}
      RTC_MIN_PORT: ${RTC_MIN_PORT:-10000}
      RTC_MAX_PORT: ${RTC_MAX_PORT:-10100}
    expose:
      - "3003"
    ports:
      # WebRTC media traffic. Socket.IO and REST still go through the HTTPS gateway.
      - "${RTC_MIN_PORT:-10000}-${RTC_MAX_PORT:-10100}:${RTC_MIN_PORT:-10000}-${RTC_MAX_PORT:-10100}/udp"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); const req=http.get({host:'127.0.0.1',port:process.env.PORT||3003,path:'/health',timeout:2000}, (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.on('timeout', () => { req.destroy(); process.exit(1); });"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  gateway:
    image: nginx:stable-alpine
    container_name: streambuted-gateway
    restart: unless-stopped
    depends_on:
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      streaming-service:
        condition: service_healthy
      live-service:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GATEWAY_INTERNAL_PORT:-8080}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1/api/v1/catalog/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

volumes:
  identity_postgres_data:
  catalog_postgres_data:
  rabbitmq_data:
  minio_data:
  streaming_mongo_data:

networks:
  backend:
