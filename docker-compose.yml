services:
  identity-postgres:
    image: postgres:16.2-alpine
    container_name: streambuted-identity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?missing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: ${POSTGRES_IDENTITY_DB:?missing}
      POSTGRES_INITDB_ARGS: "-c client_encoding=UTF8"
    ports:
      - "${POSTGRES_IDENTITY_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_IDENTITY_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data

  catalog-postgres:
    image: postgres:16.2-alpine
    container_name: streambuted-catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?missing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: ${POSTGRES_CATALOG_DB:?missing}
      POSTGRES_INITDB_ARGS: "-c client_encoding=UTF8"
    ports:
      - "${POSTGRES_CATALOG_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_CATALOG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: streambuted-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?missing}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?missing}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: streambuted-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-streambuted}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?missing}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    expose:
      - "9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - minio_data:/data

  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    container_name: streambuted-identity-service
    restart: unless-stopped
    depends_on:
      identity-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://identity-postgres:5432/${POSTGRES_IDENTITY_DB:?missing}
      DB_USERNAME: ${POSTGRES_USER:?missing}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      JWT_ISSUER: ${JWT_ISSUER:-http://identity-service:8081}
      JWT_KEY_ID: ${JWT_KEY_ID:-}
      JWT_RSA_PRIVATE_KEY_PEM: ${JWT_RSA_PRIVATE_KEY_PEM:-}
      JWT_RSA_PUBLIC_KEY_PEM: ${JWT_RSA_PUBLIC_KEY_PEM:-}
      JWT_RSA_PRIVATE_KEY_BASE64: ${JWT_RSA_PRIVATE_KEY_BASE64:-}
      JWT_RSA_PUBLIC_KEY_BASE64: ${JWT_RSA_PUBLIC_KEY_BASE64:-}
      EVENT_SIGNING_SECRET: ${EVENT_SIGNING_SECRET:?missing}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?missing}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?missing}
      RABBITMQ_VHOST: /
      SERVER_PORT: ${IDENTITY_HTTP_PORT:-8081}
      GRPC_PORT: ${IDENTITY_GRPC_PORT:-9091}
    expose:
      - "${IDENTITY_HTTP_PORT:-8081}"
      - "${IDENTITY_GRPC_PORT:-9091}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/$${SERVER_PORT:-8081}'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  catalog-service:
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
    container_name: streambuted-catalog-service
    restart: unless-stopped
    depends_on:
      catalog-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: ${CATALOG_PORT:-8082}
      DATABASE_URL: postgresql://${POSTGRES_USER:?missing}:${POSTGRES_PASSWORD:?missing}@catalog-postgres:5432/${POSTGRES_CATALOG_DB:?missing}?schema=public
      JWT_JWKS_URL: ${JWT_JWKS_URL:-http://identity-service:8081/api/v1/auth/.well-known/jwks.json}
      JWT_ISSUER: ${JWT_ISSUER:-http://identity-service:8081}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      MEDIA_GRPC_TARGET: ${MEDIA_GRPC_TARGET:-media-service:9093}
      MEDIA_GRPC_TIMEOUT_MS: ${MEDIA_GRPC_TIMEOUT_MS:-2000}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?missing}:${RABBITMQ_DEFAULT_PASS:?missing}@rabbitmq:5672
      EVENT_SIGNING_SECRET: ${EVENT_SIGNING_SECRET:?missing}
      RABBITMQ_USER_PROMOTED_QUEUE: catalog.user.promoted
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
    expose:
      - "${CATALOG_PORT:-8082}"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); const port=process.env.PORT || 8082; const req=http.get({host:'127.0.0.1',port,path:'/health',timeout:2000}, (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.on('timeout', () => { req.destroy(); process.exit(1); });"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  media-service:
    build:
      context: .
      dockerfile: services/media-service/Dockerfile
    container_name: streambuted-media-service
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      MEDIA_PORT: ${MEDIA_PORT:-8083}
      MEDIA_GRPC_PORT: ${MEDIA_GRPC_PORT:-9093}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-streambuted}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?missing}
      MINIO_BUCKET: ${MINIO_BUCKET:-streambuted-media}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MEDIA_MAX_AUDIO_SIZE_MB: ${MEDIA_MAX_AUDIO_SIZE_MB:-50}
      MEDIA_MAX_IMAGE_SIZE_MB: ${MEDIA_MAX_IMAGE_SIZE_MB:-5}
      JWT_ISSUER: ${JWT_ISSUER:-http://identity-service:8081}
      JWT_JWKS_URL: ${JWT_JWKS_URL:-http://identity-service:8081/api/v1/auth/.well-known/jwks.json}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?missing}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?missing}
      EVENT_SIGNING_SECRET: ${EVENT_SIGNING_SECRET:?missing}
    expose:
      - "${MEDIA_PORT:-8083}"
      - "${MEDIA_GRPC_PORT:-9093}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port = os.getenv('MEDIA_PORT', '8083'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  gateway:
    image: nginx:stable-alpine
    container_name: streambuted-gateway
    restart: unless-stopped
    depends_on:
      identity-service:
        condition: service_healthy
        restart: true
      catalog-service:
        condition: service_healthy
        restart: true
      media-service:
        condition: service_healthy
        restart: true
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  identity_postgres_data:
  catalog_postgres_data:
  rabbitmq_data:
  minio_data:
